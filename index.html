<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ocean Guardians</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#001b2e;
}

canvas{
display:block;
}

/* UI */
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
text-shadow:2px 2px black;
}

/* Center screens */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

#startScreen, #endScreen{
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:15px;
}

</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> |
Health: <span id="health">100</span>
</div>

<div id="startScreen" class="center">
<h1>🌊 Ocean Guardians</h1>
<p>Collect trash, avoid sharks, save the ocean!</p>
<button onclick="startGame()">Play</button>
</div>

<div id="endScreen" class="center" style="display:none;">
<h1 id="endText"></h1>
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameRunning=false;

let score=0;
let health=100;

const player={
x:200,
y:200,
r:18,
speed:5
};

const keys={};

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function startGame(){
document.getElementById("startScreen").style.display="none";
gameRunning=true;
loop();
}

/* ---------- OBJECTS ---------- */

class Trash{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.r=12;
}
draw(){
ctx.fillStyle="white";
ctx.fillRect(this.x,this.y,15,15);
}
}

class Fish{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.speed=1+Math.random()*2;
}
update(){
this.x+=this.speed;
if(this.x>canvas.width+20) this.x=-20;
}
draw(){
ctx.fillStyle="orange";
ctx.beginPath();
ctx.ellipse(this.x,this.y,14,7,0,0,Math.PI*2);
ctx.fill();
}
}

class Shark{
constructor(){
this.x=canvas.width+Math.random()*500;
this.y=Math.random()*canvas.height;
this.speed=3+Math.random()*2;
}
update(){
this.x-=this.speed;
if(this.x<-100){
this.x=canvas.width+200;
this.y=Math.random()*canvas.height;
}
}
draw(){
ctx.fillStyle="gray";
ctx.beginPath();
ctx.ellipse(this.x,this.y,35,15,0,0,Math.PI*2);
ctx.fill();
}
}

/* ---------- GAME SETUP ---------- */

const trash=[];
const fish=[];
const sharks=[];

for(let i=0;i<18;i++) trash.push(new Trash());
for(let i=0;i<20;i++) fish.push(new Fish());
for(let i=0;i<4;i++) sharks.push(new Shark());

/* ---------- MOVEMENT ---------- */

function movePlayer(){
if(keys["w"]||keys["ArrowUp"])player.y-=player.speed;
if(keys["s"]||keys["ArrowDown"])player.y+=player.speed;
if(keys["a"]||keys["ArrowLeft"])player.x-=player.speed;
if(keys["d"]||keys["ArrowRight"])player.x+=player.speed;

/* keep inside screen */
player.x=Math.max(20,Math.min(canvas.width-20,player.x));
player.y=Math.max(20,Math.min(canvas.height-20,player.y));
}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

/* ---------- DRAW OCEAN ---------- */

function drawOcean(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#3cc0ff");
g.addColorStop(1,"#003049");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* waves */
ctx.strokeStyle="rgba(255,255,255,0.15)";
for(let i=0;i<20;i++){
ctx.beginPath();
let y=i*40 + Math.sin(Date.now()/500+i)*10;
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();
}
}

/* ---------- PLAYER ---------- */

function drawPlayer(){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x+6,player.y-5,4,0,Math.PI*2);
ctx.fill();
}

/* ---------- GAME UPDATE ---------- */

function update(){

movePlayer();

/* trash collection */
for(let i=trash.length-1;i>=0;i--){
if(dist(player,trash[i])<22){
trash.splice(i,1);
score+=10;
document.getElementById("score").innerText=score;
}
}

/* sharks damage */
for(let s of sharks){
s.update();
if(dist(player,s)<40){
health--;
document.getElementById("health").innerText=health;
}
}

/* win */
if(trash.length===0){
endGame("🌊 You Saved the Ocean!");
}

/* lose */
if(health<=0){
endGame("💀 You Lost!");
}

}

/* ---------- END GAME ---------- */

function endGame(text){
gameRunning=false;
document.getElementById("endText").innerText=text;
document.getElementById("endScreen").style.display="block";
}

/* ---------- LOOP ---------- */

function loop(){
if(!gameRunning) return;

drawOcean();

fish.forEach(f=>{f.update();f.draw();});
trash.forEach(t=>t.draw());
sharks.forEach(s=>s.draw());

update();
drawPlayer();

requestAnimationFrame(loop);
}

</script>

</body>
</html>
