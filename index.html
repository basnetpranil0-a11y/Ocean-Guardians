<!DOCTYPE html>
<html>
<head>
<title>Ocean Guardians</title>
<style>
body {
margin:0;
overflow:hidden;
font-family:Arial;
background:#001f3f;
}

canvas {
display:block;
}

#ui {
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
text-shadow:2px 2px black;
}

#msg {
position:absolute;
bottom:10px;
width:100%;
text-align:center;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> |
Trash Left: <span id="left">10</span>
</div>

<div id="msg">Collect all trash to clean the ocean 🌊</div>

<canvas id="game"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let score=0;

const player={x:200,y:200,r:20,speed:5};
const keys={};

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

class Trash{
constructor(){
this.x=Math.random()*c.width;
this.y=Math.random()*c.height;
this.r=10;
}
draw(){
ctx.fillStyle="white";
ctx.fillRect(this.x,this.y,15,15);
}
}

const trash=[];
for(let i=0;i<10;i++) trash.push(new Trash());

function move(){
if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;
}

function drawOcean(){
let g=ctx.createLinearGradient(0,0,0,c.height);
g.addColorStop(0,"#00aaff");
g.addColorStop(1,"#003366");
ctx.fillStyle=g;
ctx.fillRect(0,0,c.width,c.height);
}

function drawPlayer(){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();
}

function loop(){
drawOcean();
move();

for(let i=trash.length-1;i>=0;i--){
trash[i].draw();

let dx=player.x-trash[i].x;
let dy=player.y-trash[i].y;

if(Math.sqrt(dx*dx+dy*dy)<25){
trash.splice(i,1);
score++;
document.getElementById("score").innerText=score;
document.getElementById("left").innerText=trash.length;
}
}

drawPlayer();

if(trash.length===0){
document.getElementById("msg").innerText="🌊 Ocean saved!";
}

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
