<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ocean Guardians</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#001b2e;
touch-action:none;
}

/* canvas */
canvas{
display:block;
}

/* UI */
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
text-shadow:2px 2px black;
z-index:2;
}

/* start/end screens */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:3;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

/* MOBILE CONTROLS */
#controls{
position:absolute;
bottom:20px;
left:20px;
z-index:2;
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px;
gap:5px;
}

.btn{
width:60px;
height:60px;
background:rgba(255,255,255,0.2);
border:2px solid white;
border-radius:10px;
color:white;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
user-select:none;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> |
Health: <span id="health">100</span>
</div>

<div id="startScreen" class="center">
<h1>🌊 Ocean Guardians</h1>
<p>Clean the ocean and avoid sharks!</p>
<button onclick="startGame()">Play</button>
</div>

<div id="endScreen" class="center hidden">
<h1 id="endText"></h1>
<button onclick="location.reload()">Restart</button>
</div>

<!-- MOBILE CONTROLS -->
<div id="controls">
<div></div>
<div class="btn" ontouchstart="press('up')" ontouchend="release()">▲</div>
<div></div>

<div class="btn" ontouchstart="press('left')" ontouchend="release()">◀</div>
<div class="btn" ontouchstart="press('down')" ontouchend="release()">▼</div>
<div class="btn" ontouchstart="press('right')" ontouchend="release()">▶</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameRunning=false;

let score=0;
let health=100;

const player={
x:200,
y:200,
r:18,
speed:5
};

let mobileDir=null;

const keys={};

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

/* MOBILE INPUT */
function press(dir){
mobileDir=dir;
}
function release(){
mobileDir=null;
}

function startGame(){
document.getElementById("startScreen").style.display="none";
gameRunning=true;
loop();
}

/* OBJECTS */
class Trash{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
}
draw(){
ctx.fillStyle="white";
ctx.fillRect(this.x,this.y,15,15);
}
}

class Fish{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.speed=1+Math.random()*2;
}
update(){
this.x+=this.speed;
if(this.x>canvas.width+20)this.x=-20;
}
draw(){
ctx.fillStyle="orange";
ctx.beginPath();
ctx.ellipse(this.x,this.y,14,7,0,0,Math.PI*2);
ctx.fill();
}
}

class Shark{
constructor(){
this.x=canvas.width+Math.random()*500;
this.y=Math.random()*canvas.height;
this.speed=3;
}
update(){
this.x-=this.speed;
if(this.x<-100){
this.x=canvas.width+200;
this.y=Math.random()*canvas.height;
}
}
draw(){
ctx.fillStyle="gray";
ctx.beginPath();
ctx.ellipse(this.x,this.y,35,15,0,0,Math.PI*2);
ctx.fill();
}
}

const trash=[];
const fish=[];
const sharks=[];

for(let i=0;i<15;i++) trash.push(new Trash());
for(let i=0;i<20;i++) fish.push(new Fish());
for(let i=0;i<4;i++) sharks.push(new Shark());

function movePlayer(){

/* keyboard */
if(keys["w"]||keys["ArrowUp"])player.y-=player.speed;
if(keys["s"]||keys["ArrowDown"])player.y+=player.speed;
if(keys["a"]||keys["ArrowLeft"])player.x-=player.speed;
if(keys["d"]||keys["ArrowRight"])player.x+=player.speed;

/* mobile */
if(mobileDir==="up")player.y-=player.speed;
if(mobileDir==="down")player.y+=player.speed;
if(mobileDir==="left")player.x-=player.speed;
if(mobileDir==="right")player.x+=player.speed;

player.x=Math.max(20,Math.min(canvas.width-20,player.x));
player.y=Math.max(20,Math.min(canvas.height-20,player.y));
}

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

function drawOcean(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#3cc0ff");
g.addColorStop(1,"#003049");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawPlayer(){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();
}

function update(){

movePlayer();

/* trash */
for(let i=trash.length-1;i>=0;i--){
if(dist(player,trash[i])<22){
trash.splice(i,1);
score+=10;
document.getElementById("score").innerText=score;
}
}

/* sharks */
for(let s of sharks){
s.update();
if(dist(player,s)<40){
health--;
document.getElementById("health").innerText=health;
}
}

if(trash.length===0){
end("🌊 Ocean Saved!");
}

if(health<=0){
end("💀 Game Over");
}

}

function end(text){
gameRunning=false;
document.getElementById("endText").innerText=text;
document.getElementById("endScreen").classList.remove("hidden");
}

function loop(){
if(!gameRunning) return;

drawOcean();

fish.forEach(f=>{f.update();f.draw();});
trash.forEach(t=>t.draw());
sharks.forEach(s=>s.draw());

update();
drawPlayer();

requestAnimationFrame(loop);
}

</script>

</body>
</html>
